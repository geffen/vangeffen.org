<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lou's Pet Care — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script>
  const CONFIG = {
    businessName: "Lou's Pet Care",
    ownerName: "Lou",
    ownerEmail: "lou@example.com",
    ownerPhone: "+15550000000",

    calendarId: "YOUR_CALENDAR_ID@group.calendar.google.com",
    googleApiKey: "YOUR_GOOGLE_API_KEY",
    appsScriptUrl: "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec",
    adminPassword: "changeme123",

    boarding:   { dog: { base: 55, additionalPet: 40 }, cat: { base: 35, additionalPet: 25 } },
    daycare:    { dog: { base: 35, additionalPet: 25 }, cat: { base: 25, additionalPet: 18 } },
    dogWalking: { base: 20, additionalPet: 10 },
    dropIn:     { base: 18, additionalPet: 8 }
  };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bark: #3d2b1f;
      --bark-light: #6b4c38;
      --sage: #7a9e7e;
      --gold: #c8a44a;
      --cream: #faf6f0;
      --warm-white: #fffdf9;
      --blush: #e8d5c4;
      --border: #e0d0c0;
      --text: #2a1f17;
      --text-muted: #8a7060;
      --green: #27ae60;
      --red: #c0392b;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--bark);
      color: var(--cream);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
    }
    header h1 span { color: var(--gold); }
    .badge {
      background: var(--sage);
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
    }

    /* ── Login ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }
    .login-card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(61,43,31,0.08);
      text-align: center;
    }
    .login-card h2 {
      font-family: 'Playfair Display', serif;
      color: var(--bark);
      margin-bottom: 0.5rem;
    }
    .login-card p { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 1.5rem; }
    .login-card input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      margin-bottom: 1rem;
      outline: none;
    }
    .login-card input:focus { border-color: var(--sage); }
    .btn {
      padding: 0.7rem 1.5rem;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--sage); color: white; width: 100%; }
    .btn-primary:hover { background: #6a8e6e; }
    .btn-approve { background: var(--green); color: white; }
    .btn-approve:hover { background: #219a52; }
    .btn-deny { background: var(--red); color: white; }
    .btn-deny:hover { background: #a93226; }
    .login-err { color: var(--red); font-size: 0.82rem; margin-top: 0.5rem; display: none; }

    /* ── Dashboard ── */
    #dashboard { display: none; }
    main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--bark);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--blush);
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      background: var(--warm-white);
      border-radius: 12px;
      border: 1px dashed var(--border);
    }

    /* Booking cards */
    .booking-card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(61,43,31,0.05);
      animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .booking-card.pending { border-left: 4px solid var(--gold); }
    .booking-card.approved { border-left: 4px solid var(--green); }
    .booking-card.denied { border-left: 4px solid var(--red); opacity: 0.65; }

    .booking-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .booking-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--bark);
    }
    .booking-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }
    .status-chip {
      padding: 0.2rem 0.65rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 500;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .chip-pending { background: rgba(200,164,74,0.15); color: #7d6520; }
    .chip-approved { background: rgba(39,174,96,0.12); color: #1e8449; }
    .chip-denied { background: rgba(192,57,43,0.1); color: #922b21; }

    .booking-details {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .detail-item label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      display: block;
      margin-bottom: 0.15rem;
    }
    .detail-item span { font-size: 0.9rem; font-weight: 500; }

    .quote-display {
      background: var(--bark);
      color: var(--cream);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }
    .quote-display strong { color: var(--gold); font-size: 1.1rem; }

    .booking-notes {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 1rem;
      padding: 0.65rem 0.85rem;
      background: var(--cream);
      border-radius: 8px;
      border-left: 3px solid var(--blush);
    }

    .booking-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .tab {
      padding: 0.5rem 1.1rem;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .tab.active { background: var(--bark); color: var(--cream); border-color: var(--bark); }

    .refresh-btn {
      float: right;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.35rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text-muted);
      font-family: inherit;
    }
    .refresh-btn:hover { background: var(--blush); }

    /* Calendar embed area */
    #cal-section { margin-top: 2.5rem; }
    #cal-section iframe { border: 1px solid var(--border); border-radius: 12px; }
  </style>
</head>
<body>

<header>
  <h1>Lou's <span>Pet Care</span> — Admin</h1>
  <span class="badge" id="header-badge">🔒 Locked</span>
</header>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h2>🐾 Admin Login</h2>
    <p>Enter your password to manage bookings</p>
    <input type="password" id="pw-input" placeholder="Password" />
    <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err">Incorrect password.</div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <main>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
      <div class="tabs">
        <button class="tab active" onclick="filterTab('pending', this)">⏳ Pending</button>
        <button class="tab" onclick="filterTab('approved', this)">✅ Approved</button>
        <button class="tab" onclick="filterTab('all', this)">All</button>
      </div>
      <button class="refresh-btn" onclick="loadBookings()">↻ Refresh</button>
    </div>

    <div id="bookings-container">
      <div class="empty-state">Loading bookings…</div>
    </div>

    <!-- Google Calendar embed -->
    <div id="cal-section">
      <div class="section-title" style="margin-top:2rem;">📅 Calendar</div>
      <iframe id="gcal-embed" src="" width="100%" height="500" frameborder="0" scrolling="no"></iframe>
    </div>
  </main>
</div>

<script>
const SERVICE_LABELS = {
  boarding: 'Overnight Boarding',
  daycare: 'Day Care',
  dogWalking: 'Dog Walking',
  dropIn: 'Drop-In Visit'
};

let allBookings = [];
let activeFilter = 'pending';

// ── Login ─────────────────────────────────────────────────────────────────

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === CONFIG.adminPassword) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('header-badge').textContent = '✅ Lou';
    loadCalendar();
    loadBookings();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── Load Bookings ─────────────────────────────────────────────────────────

async function loadBookings() {
  document.getElementById('bookings-container').innerHTML = '<div class="empty-state">Loading…</div>';
  try {
    const url = CONFIG.appsScriptUrl + '?action=getBookings';
    const res = await fetch(url);
    const data = await res.json();
    allBookings = data.bookings || [];
    renderBookings();
  } catch (e) {
    document.getElementById('bookings-container').innerHTML =
      `<div class="empty-state">⚠️ Could not load bookings.<br><small>Make sure your Apps Script URL is set in config.js</small></div>`;
  }
}

function filterTab(filter, el) {
  activeFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderBookings();
}

function renderBookings() {
  const container = document.getElementById('bookings-container');
  let filtered = allBookings;
  if (activeFilter !== 'all') filtered = allBookings.filter(b => b.status === activeFilter);

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">No ${activeFilter === 'all' ? '' : activeFilter + ' '}bookings found.</div>`;
    return;
  }

  container.innerHTML = filtered.map(b => bookingCard(b)).join('');
}

function bookingCard(b) {
  const statusChip = {
    pending: '<span class="status-chip chip-pending">Pending</span>',
    approved: '<span class="status-chip chip-approved">Approved</span>',
    denied: '<span class="status-chip chip-denied">Denied</span>'
  }[b.status] || '';

  const actions = b.status === 'pending' ? `
    <button class="btn btn-approve" onclick="updateBooking('${b.id}', 'approved')">✅ Approve</button>
    <button class="btn btn-deny" onclick="updateBooking('${b.id}', 'denied')">❌ Deny</button>
  ` : b.status === 'approved' ? `
    <button class="btn btn-deny" onclick="updateBooking('${b.id}', 'denied')">❌ Cancel</button>
  ` : '';

  const notes = b.petNotes ? `<div class="booking-notes">📝 ${b.petNotes}</div>` : '';

  return `
    <div class="booking-card ${b.status}" id="card-${b.id}">
      <div class="booking-header">
        <div>
          <div class="booking-title">${b.ownerName} — ${b.petNames}</div>
          <div class="booking-meta">Submitted ${formatDate(b.submittedAt)}</div>
        </div>
        ${statusChip}
      </div>
      <div class="booking-details">
        <div class="detail-item"><label>Service</label><span>${SERVICE_LABELS[b.service] || b.service}</span></div>
        <div class="detail-item"><label>Check-in</label><span>${b.checkin}</span></div>
        <div class="detail-item"><label>Check-out</label><span>${b.checkout}</span></div>
        <div class="detail-item"><label>Pets</label><span>${b.petCount} ${b.petType}${b.petCount > 1 ? 's' : ''}</span></div>
        <div class="detail-item"><label>Phone</label><span>${b.ownerPhone}</span></div>
        <div class="detail-item"><label>Email</label><span>${b.ownerEmail}</span></div>
      </div>
      <div class="quote-display">
        Quoted: <strong>${b.quotedAmount}</strong>
        <span style="color:#bbb;font-size:0.78rem;margin-left:0.5rem;">${(b.quoteBreakdown || '').replace(/\n/g, ' · ')}</span>
      </div>
      ${notes}
      <div class="booking-actions">${actions}</div>
    </div>
  `;
}

async function updateBooking(id, status) {
  const card = document.getElementById('card-' + id);
  if (card) card.style.opacity = '0.5';

  try {
    await fetch(CONFIG.appsScriptUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'updateBooking', id, status })
    });
    // Optimistically update
    const b = allBookings.find(x => x.id === id);
    if (b) b.status = status;
    renderBookings();
  } catch (e) {
    alert('Failed to update booking. Try refreshing.');
    if (card) card.style.opacity = '1';
  }
}

function formatDate(ts) {
  if (!ts) return '—';
  try { return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }); }
  catch { return ts; }
}

// ── Calendar ──────────────────────────────────────────────────────────────

function loadCalendar() {
  const calId = encodeURIComponent(CONFIG.calendarId);
  const src = `https://calendar.google.com/calendar/embed?src=${calId}&ctz=America%2FLos_Angeles&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&mode=MONTH`;
  document.getElementById('gcal-embed').src = src;
}
</script>
</body>
</html>
